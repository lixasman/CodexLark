name: Feature request
description: 提出功能建议、使用场景或体验改进想法
title: "[Feature] "
body:
  - type: markdown
    attributes:
      value: |
        感谢你的建议。

        为了让维护者更容易判断价值与风险，请尽量说明：

        - 你想解决的真实问题是什么
        - 为什么现有行为不够用
        - 这个建议是否会影响权限、安全边界、日志落盘或运行方式

  - type: textarea
    id: problem
    attributes:
      label: 你想解决什么问题
      description: 先说痛点，而不是先给实现方案
      placeholder: 例如：当前状态卡只能看到最近任务，我希望能快速筛选特定目录下的任务
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 你期望的方案
      description: 描述你希望新增或改进的行为
      placeholder: 例如：在启动器或状态卡里增加按目录筛选最近任务的入口
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 你考虑过的替代方案
      description: 可以写现有 workaround，或者为什么不接受其它做法
      placeholder: 例如：手工接管列表能绕过问题，但步骤太多，飞书端操作成本高
    validations:
      required: false

  - type: textarea
    id: impact
    attributes:
      label: 预期影响与边界
      description: 请说明它更偏向文档、交互、会话控制、权限模型还是部署方式变化
      placeholder: 例如：只影响飞书状态卡交互，不改变本地命令执行模型
    validations:
      required: false

  - type: dropdown
    id: breaking_change
    attributes:
      label: 这个建议是否可能改变现有行为
      options:
        - 否，应该是纯增量改进
        - 可能会影响现有行为
        - 不确定
    validations:
      required: true

  - type: dropdown
    id: willing_to_help
    attributes:
      label: 你是否愿意参与实现或验证
      options:
        - 我愿意提交 PR
        - 我愿意协助测试
        - 我目前只能提供需求反馈
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: 补充信息
      description: 可附上示例消息、期望卡片交互、流程草图或相关 issue
      placeholder: 例如：希望和 README 中的整体架构保持一致，不引入新的部署模式
    validations:
      required: false
