name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: Build and test on Windows
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        shell: pwsh
        run: npm ci

      - name: Build
        shell: pwsh
        run: npm run build

      - name: Test
        shell: pwsh
        run: npm test
